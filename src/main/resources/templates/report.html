<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재무 레포트</title>

    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #0f766e;
            --income: #166534;
            --expense: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 1160px;
            margin: 0 auto;
            padding: 32px;
        }

        .header,
        .month-bar,
        .section-title,
        .goal-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1,
        .month-title,
        .section-title h2 {
            margin: 0;
        }

        .header p {
            margin: 6px 0 0;
            color: var(--muted);
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn,
        .dashboard-btn,
        .settings-trigger,
        .menu-item,
        .logout-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
        }

        .dashboard-btn {
            padding: 10px 16px;
            background: var(--primary);
            color: #ffffff;
        }

        .logout-btn {
            padding: 10px 16px;
            background: #e5e7eb;
            color: var(--text);
        }

        .settings-menu-wrap {
            position: relative;
        }

        .settings-trigger {
            width: 42px;
            height: 42px;
            background: #e5e7eb;
            color: var(--text);
            font-size: 20px;
        }

        .settings-popover {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            z-index: 10;
            display: none;
            min-width: 150px;
            padding: 8px;
            background: #ffffff;
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 16px 32px rgba(15, 23, 42, 0.16);
        }

        .settings-popover.open {
            display: block;
        }

        .menu-item {
            width: 100%;
            height: 38px;
            padding: 0 12px;
            background: transparent;
            color: var(--text);
            text-align: left;
        }

        .menu-item:hover {
            background: #f3f4f6;
        }

        .month-bar,
        .card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }

        .month-bar {
            margin-bottom: 18px;
            padding: 18px 20px;
        }

        .month-title {
            font-size: 22px;
            text-align: center;
        }

        .nav-btn {
            min-width: 44px;
            height: 40px;
            padding: 0 14px;
            background: #eef2f7;
            color: var(--text);
            font-size: 18px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 18px;
        }

        .card {
            padding: 24px;
        }

        .metric span {
            color: var(--muted);
            font-size: 14px;
        }

        .metric strong {
            display: block;
            margin-top: 10px;
            font-size: 26px;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 18px;
        }

        .section-title {
            margin-bottom: 18px;
        }

        .bar-row {
            display: grid;
            grid-template-columns: 110px 1fr 110px;
            gap: 14px;
            align-items: center;
            margin-bottom: 14px;
        }

        .bar-bg,
        .progress-bg {
            overflow: hidden;
            background: #e5e7eb;
            border-radius: 999px;
        }

        .bar-bg {
            height: 28px;
        }

        .bar-fill,
        .progress-fill {
            height: 100%;
            border-radius: 999px;
            background: var(--primary);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px 12px;
            border-bottom: 1px solid var(--line);
            text-align: left;
            white-space: nowrap;
        }

        th {
            color: var(--muted);
            background: #f9fafb;
            font-size: 13px;
        }

        .amount {
            text-align: right;
            font-weight: 700;
        }

        .income {
            color: var(--income);
        }

        .expense {
            color: var(--expense);
        }

        .goal-row {
            margin-bottom: 20px;
        }

        .goal-title {
            margin-bottom: 8px;
            font-weight: 700;
        }

        .progress-bg {
            height: 12px;
        }

        .empty {
            padding: 34px 12px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 900px) {
            .container {
                padding: 22px 16px;
            }

            .header,
            .section-title {
                align-items: flex-start;
                flex-direction: column;
            }

            .header-actions,
            .month-bar {
                width: 100%;
            }

            .header-actions {
                justify-content: space-between;
            }

            .summary-grid,
            .content-grid {
                grid-template-columns: 1fr;
            }

            .bar-row {
                grid-template-columns: 90px 1fr;
            }

            .bar-row .amount {
                grid-column: 2;
                text-align: left;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px 12px 24px;
            }

            .header {
                gap: 12px;
                margin-bottom: 16px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 14px;
                line-height: 1.4;
            }

            .header-actions {
                gap: 8px;
                justify-content: flex-start;
            }

            .dashboard-btn,
            .logout-btn {
                min-height: 38px;
                padding: 0 13px;
                font-size: 14px;
            }

            .settings-trigger {
                width: 38px;
                height: 38px;
                font-size: 18px;
            }

            .settings-popover {
                min-width: 132px;
            }

            .month-bar {
                gap: 10px;
                margin-bottom: 14px;
                padding: 12px;
            }

            .month-title {
                flex: 1;
                font-size: 19px;
            }

            .nav-btn {
                min-width: 38px;
                height: 36px;
                padding: 0 10px;
            }

            .summary-grid,
            .content-grid {
                gap: 10px;
                margin-bottom: 14px;
            }

            .card {
                padding: 16px;
            }

            .metric strong {
                margin-top: 6px;
                font-size: 22px;
            }

            .section-title {
                gap: 10px;
                margin-bottom: 14px;
            }

            .section-title h2 {
                font-size: 19px;
            }

            .bar-row {
                gap: 8px 10px;
                margin-bottom: 12px;
            }

            th,
            td {
                padding: 11px 10px;
            }
        }
    </style>

    <link rel="icon" href="/images/cash_mng_icon.png">
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>재무 레포트</h1>
            <p th:text="${userName != null ? userName + '님의 월별 흐름을 확인합니다.' : '월별 흐름을 확인합니다.'}">
                월별 흐름을 확인합니다.
            </p>
        </div>
        <div class="header-actions">
            <a class="dashboard-btn" th:href="@{/dashboard(month=${selectedMonth})}">대시보드</a>
            <div class="settings-menu-wrap">
                <button class="settings-trigger" type="button" onclick="toggleSettingsMenu()" aria-label="설정 메뉴"
                        aria-expanded="false">
                    &#9881;
                </button>
                <div class="settings-popover" id="settingsPopover">
                    <a class="menu-item" href="/settings">설정</a>
                    <button class="menu-item" type="button" onclick="logout()">로그아웃</button>
                </div>
            </div>
        </div>
    </div>

    <div class="month-bar">
        <a class="nav-btn" th:href="@{/report(month=${prevMonth})}" aria-label="이전달">‹</a>
        <h2 class="month-title" th:text="${displayMonth}">2026년 4월</h2>
        <a class="nav-btn" th:href="@{/report(month=${nextMonth})}" aria-label="다음달">›</a>
    </div>

    <div class="summary-grid">
        <div class="card metric">
            <span>총 수입</span>
            <strong class="income" th:text="${#numbers.formatDecimal(incomeTotal, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong>
        </div>
        <div class="card metric">
            <span>총 지출</span>
            <strong class="expense" th:text="${#numbers.formatDecimal(expenseTotal, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong>
        </div>
        <div class="card metric">
            <span>잔액</span>
            <strong th:text="${#numbers.formatDecimal(balance, 0, 'COMMA', 0, 'POINT')} + '원'">0원</strong>
        </div>
    </div>

    <div class="content-grid">
        <section class="card">
            <div class="section-title">
                <h2>항목별 지출</h2>
            </div>

            <div th:if="${#lists.isEmpty(expenseCategoryTotals)}" class="empty">
                이번 달 지출 내역이 없습니다.
            </div>

            <div class="bar-row" th:each="categoryTotal : ${expenseCategoryTotals}">
                <div th:text="${categoryTotal.category}">식비</div>
                <div class="bar-bg">
                    <div class="bar-fill" th:style="'width: ' + ${categoryTotal.percent} + '%;'"></div>
                </div>
                <div class="amount expense"
                     th:text="${#numbers.formatDecimal(categoryTotal.amount, 0, 'COMMA', 0, 'POINT')} + '원'">
                    0원
                </div>
            </div>
        </section>

        <section class="card">
            <div class="section-title">
                <h2>목표 달성률</h2>
            </div>

            <div class="goal-row">
                <div class="goal-title">
                    <span>월 지출 100만원 이하</span>
                    <span th:text="${expenseGoalPercent} + '%'">0%</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" th:style="'width: ' + ${expenseGoalPercent} + '%;'"></div>
                </div>
            </div>

            <div class="goal-row">
                <div class="goal-title">
                    <span>수입 대비 잔액 비율</span>
                    <span th:text="${savingRatePercent} + '%'">0%</span>
                </div>
                <div class="progress-bg">
                    <div class="progress-fill" th:style="'width: ' + ${savingRatePercent} + '%;'"></div>
                </div>
            </div>
        </section>
    </div>

    <section class="card" style="margin-top: 18px;">
        <div class="section-title">
            <h2>전월 비교</h2>
        </div>

        <table>
            <thead>
            <tr>
                <th>항목</th>
                <th th:text="${previousDisplayMonth}">저번달</th>
                <th th:text="${displayMonth}">이번달</th>
                <th class="amount">증감</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>수입</td>
                <td th:text="${#numbers.formatDecimal(previousIncomeTotal, 0, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                <td th:text="${#numbers.formatDecimal(incomeTotal, 0, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                <td class="amount"
                    th:classappend="${incomeDifference.compareTo(T(java.math.BigDecimal).ZERO) >= 0 ? ' income' : ' expense'}"
                    th:text="${(incomeDifference.compareTo(T(java.math.BigDecimal).ZERO) >= 0 ? '+' : '') + #numbers.formatDecimal(incomeDifference, 0, 'COMMA', 0, 'POINT') + '원'}">
                    0원
                </td>
            </tr>
            <tr>
                <td>지출</td>
                <td th:text="${#numbers.formatDecimal(previousExpenseTotal, 0, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                <td th:text="${#numbers.formatDecimal(expenseTotal, 0, 'COMMA', 0, 'POINT')} + '원'">0원</td>
                <td class="amount"
                    th:classappend="${expenseDifference.compareTo(T(java.math.BigDecimal).ZERO) >= 0 ? ' expense' : ' income'}"
                    th:text="${(expenseDifference.compareTo(T(java.math.BigDecimal).ZERO) >= 0 ? '+' : '') + #numbers.formatDecimal(expenseDifference, 0, 'COMMA', 0, 'POINT') + '원'}">
                    0원
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</div>

<script>
    function toggleSettingsMenu() {
        const popover = document.getElementById("settingsPopover");
        const trigger = document.querySelector(".settings-trigger");
        const isOpen = popover.classList.toggle("open");
        trigger.setAttribute("aria-expanded", String(isOpen));
    }

    function logout() {
        fetch("/api/auth/logout", {
            method: "POST"
        }).then(() => {
            location.href = "/login";
        });
    }

    document.addEventListener("click", (event) => {
        const menuWrap = document.querySelector(".settings-menu-wrap");
        const popover = document.getElementById("settingsPopover");
        const trigger = document.querySelector(".settings-trigger");

        if (!menuWrap.contains(event.target)) {
            popover.classList.remove("open");
            trigger.setAttribute("aria-expanded", "false");
        }
    });
</script>

</body>
</html>
