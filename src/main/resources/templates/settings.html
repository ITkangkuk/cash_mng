<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>설정</title>

    <style>
        :root {
            --bg: #f4f6f8;
            --panel: #ffffff;
            --line: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --primary: #0f766e;
            --primary-dark: #115e59;
            --danger: #b91c1c;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 920px;
            margin: 0 auto;
            padding: 32px;
        }

        .header,
        .section-title,
        .option-row,
        .settings-form {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 14px;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1,
        .section-title h2 {
            margin: 0;
        }

        .header p {
            margin: 6px 0 0;
            color: var(--muted);
        }

        .dashboard-btn,
        .add-btn,
        .remove-btn,
        .reset-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 42px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            text-decoration: none;
            white-space: nowrap;
        }

        .dashboard-btn,
        .add-btn {
            padding: 0 16px;
            background: var(--primary);
            color: #ffffff;
        }

        .dashboard-btn:hover,
        .add-btn:hover {
            background: var(--primary-dark);
        }

        .section {
            margin-top: 18px;
            padding: 24px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 8px;
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.04);
        }

        .section-title {
            margin-bottom: 18px;
        }

        .section-title span {
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        .settings-form {
            margin-bottom: 14px;
            align-items: end;
        }

        .field {
            flex: 1;
        }

        .type-value-field {
            max-width: 180px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: var(--muted);
            font-size: 13px;
            font-weight: 700;
        }

        input,
        select {
            width: 100%;
            height: 42px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            padding: 0 12px;
            background: #ffffff;
            font-size: 15px;
        }

        .option-list {
            display: grid;
            gap: 10px;
            max-height: 260px;
            overflow-y: auto;
            padding-right: 6px;
        }

        .option-row {
            min-height: 46px;
            padding: 10px 12px;
            background: #f9fafb;
            border: 1px solid var(--line);
            border-radius: 8px;
        }

        .option-name {
            font-weight: 700;
        }

        .option-meta {
            color: var(--muted);
            font-size: 13px;
        }

        .remove-btn,
        .reset-btn {
            padding: 0 14px;
            background: #fee2e2;
            color: var(--danger);
        }

        .reset-btn {
            margin-top: 14px;
            background: #e5e7eb;
            color: var(--text);
        }

        .empty {
            padding: 22px 12px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 720px) {
            .container {
                padding: 22px 16px;
            }

            .header,
            .section-title,
            .settings-form,
            .option-row {
                align-items: stretch;
                flex-direction: column;
            }

            .type-value-field {
                max-width: none;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 16px 12px 24px;
            }

            .header {
                gap: 12px;
                margin-bottom: 16px;
            }

            .header h1 {
                font-size: 24px;
            }

            .header p {
                font-size: 14px;
                line-height: 1.4;
            }

            .dashboard-btn,
            .add-btn,
            .remove-btn,
            .reset-btn {
                height: 38px;
                padding: 0 13px;
                font-size: 14px;
            }

            .dashboard-btn,
            .add-btn,
            .reset-btn {
                width: 100%;
            }

            .section {
                margin-top: 14px;
                padding: 16px;
            }

            .section-title,
            .settings-form {
                gap: 10px;
                margin-bottom: 14px;
            }

            .section-title h2 {
                font-size: 19px;
            }

            input,
            select {
                height: 38px;
                border-radius: 7px;
                padding: 0 10px;
                font-size: 14px;
            }

            label {
                margin-bottom: 5px;
            }

            .option-list {
                gap: 8px;
                padding-right: 0;
            }

            .option-row {
                gap: 8px;
                min-height: 42px;
                padding: 9px 10px;
            }

            .remove-btn {
                align-self: flex-start;
            }

            .reset-btn {
                margin-top: 12px;
            }
        }
    </style>

    <link rel="icon" href="/images/cash_mng_icon.png">
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>설정</h1>
            <p th:text="${userName != null ? userName + '님의 거래 입력 옵션을 관리합니다.' : '거래 입력 옵션을 관리합니다.'}">
                거래 입력 옵션을 관리합니다.
            </p>
        </div>
        <a class="dashboard-btn" href="/dashboard">대시보드</a>
    </div>

    <section class="section">
        <div class="section-title">
            <h2>항목</h2>
            <span>거래 추가의 항목 select에 표시됩니다.</span>
        </div>

        <form class="settings-form" th:action="@{/settings/categories}" method="post">
            <div class="field">
                <label for="categoryInput">항목 이름</label>
                <input id="categoryInput" name="label" type="text" maxlength="50" placeholder="예: 식비" required>
            </div>
            <button class="add-btn" type="submit">추가</button>
        </form>

        <div class="option-list">
            <div th:if="${#lists.isEmpty(categoryOptions)}" class="empty">등록된 항목이 없습니다.</div>
            <div class="option-row" th:each="category : ${categoryOptions}">
                <div class="option-name" th:text="${category.label}">식비</div>
                <form th:action="@{/settings/options/{optionId}/delete(optionId=${category.id})}" method="post">
                    <button class="remove-btn" type="submit">삭제</button>
                </form>
            </div>
        </div>
        <form th:action="@{/settings/categories/reset}" method="post">
            <button class="reset-btn" type="submit">기본값 복원</button>
        </form>
    </section>

    <section class="section">
        <div class="section-title">
            <h2>구분</h2>
            <span>수입/지출 중 어떤 값으로 저장할지 선택합니다.</span>
        </div>

        <form class="settings-form" th:action="@{/settings/types}" method="post">
            <div class="field">
                <label for="typeLabelInput">표시 이름</label>
                <input id="typeLabelInput" name="label" type="text" maxlength="30" placeholder="예: 생활비 지출" required>
            </div>
            <div class="field type-value-field">
                <label for="typeValueInput">저장 구분</label>
                <select id="typeValueInput" name="typeValue" required>
                    <option value="EXPENSE">지출</option>
                    <option value="INCOME">수입</option>
                </select>
            </div>
            <button class="add-btn" type="submit">추가</button>
        </form>

        <div class="option-list">
            <div th:if="${#lists.isEmpty(typeOptions)}" class="empty">등록된 구분이 없습니다.</div>
            <div class="option-row" th:each="typeOption : ${typeOptions}">
                <div>
                    <div class="option-name" th:text="${typeOption.label}">지출</div>
                    <div class="option-meta"
                         th:text="${typeOption.value.name() == 'INCOME' ? '수입으로 저장' : '지출로 저장'}">
                        지출로 저장
                    </div>
                </div>
                <form th:action="@{/settings/options/{optionId}/delete(optionId=${typeOption.id})}" method="post">
                    <button class="remove-btn" type="submit">삭제</button>
                </form>
            </div>
        </div>
        <form th:action="@{/settings/types/reset}" method="post">
            <button class="reset-btn" type="submit">기본값 복원</button>
        </form>
    </section>
</div>

</body>
</html>
