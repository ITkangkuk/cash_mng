<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            background: #f5f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }

        .login-box {
            width: 400px;
            background: white;
            padding: 42px;
            border-radius: 28px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 28px;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #10b981;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 16px;
            background: #059669;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }

        button:hover {
            background: #047857;
        }

        .error-message {
            margin-top: 14px;
            font-size: 14px;
            color: #dc2626;
        }

        .logo {
            width: 180px;
            height: 120px;
            margin: 0 auto 24px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .remember-box {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0 18px;
            font-size: 14px;
            color: #555;
        }

        .remember-box input {
            width: auto;
            margin: 0;
        }

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding: 28px 12px;
            }

            .login-box {
                width: 100%;
                max-width: 390px;
                padding: 28px 22px;
                border-radius: 18px;
            }

            .logo {
                width: 150px;
                height: 100px;
                margin-bottom: 18px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                margin-bottom: 22px;
            }

            input,
            button {
                border-radius: 12px;
                font-size: 14px;
            }

            input {
                padding: 12px 14px;
                margin-bottom: 12px;
            }

            button {
                padding: 12px;
            }

            .remember-box {
                margin-bottom: 16px;
            }
        }
    </style>

    <link rel="icon" href="/images/cash_mng_icon.png">
</head>
<body>

<div class="login-box">
    <div class="logo">
        <img src="/images/cash_mng_icon.png" alt="logo">
    </div>

    <h1>로그인</h1>
    <p>월별 재무 현황을 확인하세요</p>

    <input type="text" id="loginId" placeholder="아이디">
    <input type="password" id="password" placeholder="비밀번호">
    <label class="remember-box">
        <input type="checkbox" id="rememberMe">
        자동 로그인
    </label>

    <button onclick="login()">로그인</button>

    <div id="errorMessage" class="error-message"></div>
</div>

<script>
    function login() {
        const loginId = document.getElementById("loginId").value;
        const password = document.getElementById("password").value;
        const errorMessage = document.getElementById("errorMessage");
        const rememberMe = document.getElementById("rememberMe").checked;

        const formData = new URLSearchParams();
        formData.append("loginId", loginId);
        formData.append("password", password);
        formData.append("rememberMe", rememberMe);

        fetch("/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                location.href = "/dashboard";
            } else {
                errorMessage.innerText = data.message;
            }
        })
        .catch(() => {
            errorMessage.innerText = "로그인 중 오류가 발생했습니다.";
        });
    }
</script>

</body>
</html>
